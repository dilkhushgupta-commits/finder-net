version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finder-net-backend
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
      AI_SERVICE_URL: http://ai-service:8000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      ai-service:
        condition: service_started
    networks:
      - finder-net-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # AI Matching Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: finder-net-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PORT: 8000
    networks:
      - finder-net-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Frontend (nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: ""
        VITE_APP_NAME: Finder-Net
    container_name: finder-net-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - finder-net-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  uploads_data:
    driver: local

networks:
  finder-net-network:
    driver: bridge
